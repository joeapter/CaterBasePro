{% extends "admin/base_site.html" %}

{% block content %}
<div id="content-main">
    <h1>{{ title }}</h1>
    <p>Create a mobile app user and assign permissions in one step.</p>

    <form method="post" novalidate>
        {% csrf_token %}
        <fieldset class="module aligned">
            {{ form.as_p }}
        </fieldset>
        <div class="submit-row">
            <input type="submit" class="default" value="Create app user">
            <a href="{{ back_url }}" class="button cancel-link">Back</a>
        </div>
    </form>
</div>
{% endblock %}
